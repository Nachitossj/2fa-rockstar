<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Rockstar 2FA</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jssha/3.2.0/sha1.min.js"></script><script src="https://cdn.jsdelivr.net/npm/thirty-two@1.0.2/thirty-two.min.js"></script><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#121217;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}.container{background:#1f1f2a;color:#fff;padding:30px;border-radius:12px;width:400px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,0.5)}h1{margin-bottom:20px;color:#5865f2}.form-group{margin-bottom:20px}input{width:100%;padding:12px;margin:10px 0;border-radius:6px;border:none;font-size:14px}button{width:100%;padding:12px;background:#5865f2;color:white;border:none;border-radius:6px;font-weight:bold;font-size:16px;cursor:pointer;transition:background 0.3s}button:hover{background:#4752c4}.warning{font-size:11px;color:#ffcc00;margin-top:10px}.code-display{background:#2f3136;border:2px solid #5865f2;border-radius:10px;padding:30px;margin-top:30px;display:none}.code-display.active{display:block}.codigo-label{font-size:12px;color:#b9bbbe;margin-bottom:10px;text-transform:uppercase;letter-spacing:2px}.codigo-grande{font-size:48px;font-weight:bold;color:#43b581;letter-spacing:8px;margin:20px 0;font-family:monospace;text-shadow:0 0 10px rgba(67,181,129,0.3)}.timer-container{display:flex;align-items:center;justify-content:center;gap:15px;margin-top:20px}.timer-label{font-size:12px;color:#b9bbbe;text-transform:uppercase;letter-spacing:1px}.timer-circle{width:60px;height:60px;border-radius:50%;background:#5865f2;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:white;position:relative}.timer-circle::before{content:'';position:absolute;width:100%;height:100%;border-radius:50%;border:3px solid #43b581;animation:pulse 1s infinite}@keyframes pulse{0%{transform:scale(1);opacity:1}100%{transform:scale(1.1);opacity:0}}.error{background:#2f3136;border:2px solid #f04747;border-radius:10px;padding:20px;margin-top:20px;color:#f04747;display:none}.error.show{display:block}</style></head><body><div class="container"><h1>2FA Rockstar</h1><div class="form-group"><input type="text" id="authKey" placeholder="Ingresa tu Auth Key" required><button onclick="generarCodigo()">Generar Codigo</button><p class="warning">No compartas tu Auth Key</p></div><div class="code-display" id="codeDisplay"><div class="codigo-label">Tu Codigo 2FA:</div><div class="codigo-grande" id="codigoTexto">000000</div><div class="timer-container"><div class="timer-label">Caduca en:</div><div class="timer-circle" id="timerCircle">30</div></div></div><div class="error" id="error"></div></div><script>function generateTOTP(secret){try{const decoded=base32.toByteArray(secret);let time=Math.floor(Date.now()/1000/30);const timeBytes=new Uint8Array(8);for(let i=7;i>=0;i--){timeBytes[i]=time&0xff;time>>=8}let hash=new jsSHA("SHA-1","UINT8ARRAY");hash.setHMACKey(decoded,"UINT8ARRAY");hash.update(timeBytes);const hmac=hash.getHMAC("UINT8ARRAY");const offset=hmac[hmac.length-1]&0xf;const code=(((hmac[offset]&0x7f)<<24)|((hmac[offset+1]&0xff)<<16)|((hmac[offset+2]&0xff)<<8)|(hmac[offset+3]&0xff))%1000000;return String(code).padStart(6,'0')}catch(e){return null}}let timerInterval=null;function generarCodigo(){const authKey=document.getElementById('authKey').value.trim().toUpperCase();const errorDiv=document.getElementById('error');const codeDisplay=document.getElementById('codeDisplay');errorDiv.classList.remove('show');if(!authKey){errorDiv.textContent='Por favor ingresa tu Auth Key';errorDiv.classList.add('show');return}if(!/^[A-Z2-7=]+$/.test(authKey)){errorDiv.textContent='Auth Key invalido. Solo debe contener A-Z y 2-7';errorDiv.classList.add('show');return}if(timerInterval)clearInterval(timerInterval);function actualizar(){const codigo=generateTOTP(authKey);if(codigo){document.getElementById('codigoTexto').textContent=codigo;const tiempo=30-(Math.floor(Date.now()/1000)%30);document.getElementById('timerCircle').textContent=tiempo;codeDisplay.classList.add('active')}else{errorDiv.textContent='Error generando el codigo. Verifica tu Auth Key.';errorDiv.classList.add('show')}}actualizar();timerInterval=setInterval(actualizar,1000)}document.getElementById('authKey').addEventListener('keypress',function(e){if(e.key==='Enter')generarCodigo()})</script></body></html>
